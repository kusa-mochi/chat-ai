services:
  postgres:
    image: postgres:16-alpine
    container_name: story-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatai}
      POSTGRES_USER: ${POSTGRES_USER:-chatai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatai} -d ${POSTGRES_DB:-chatai}"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: story-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  ollama:
    image: ollama/ollama:0.6.6
    container_name: story-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  backend:
    build:
      context: ./backend
    container_name: story-backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-chatai}:${POSTGRES_PASSWORD:-chatai}@postgres:5432/${POSTGRES_DB:-chatai}
      CORS_ORIGINS: http://localhost:3000
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen2.5:7b-instruct}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      VECTOR_URL: http://qdrant:6333
      VECTOR_COLLECTION: ${VECTOR_COLLECTION:-story_context}
      GENERATED_IMAGES_DIR: /app/generated-images
    volumes:
      - generated_images:/app/generated-images
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: story-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  generated_images:
